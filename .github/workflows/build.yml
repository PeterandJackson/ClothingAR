name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Convert GLB to SCN
        run: |
          swift - <<'EOF'
          import ModelIO
          import SceneKit
          let glb = "ClothingAR/Resources/Models/THIN_WELD_DECIMATED_new.glb"
          let scn = "ClothingAR/Resources/Models/THIN_WELD_DECIMATED_new.scn"
          guard FileManager.default.fileExists(atPath: glb) else { print("No GLB, skip"); exit(0) }
          let a = MDLAsset(url: URL(fileURLWithPath: glb))
          guard a.count > 0 else { print("GLB load failed"); exit(1) }
          let s = SCNScene(mdlAsset: a)
          s.write(to: URL(fileURLWithPath: scn), options: nil, delegate: nil, progressHandler: nil)
          print("GLB -> SCN OK")
          EOF

      - run: python3 gen_pbxproj.py

      - name: Archive
        run: |
          xcodebuild archive \
            -project ClothingAR.xcodeproj \
            -scheme ClothingAR \
            -archivePath ClothingAR.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.clothingar.app \
            IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R ClothingAR.xcarchive/Products/Applications/ClothingAR.app Payload/
          zip -r -y ClothingAR-unsigned.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ClothingAR-unsigned
          path: ClothingAR-unsigned.ipa
          retention-days: 7
